# ===== Planify — configuração =====
# Os valores padrão funcionam com o docker-compose deste projeto.
# Fora do Docker, ajuste as variáveis de ambiente ou edite aqui.

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/planify}
spring.datasource.username=${DB_USER:planify}
spring.datasource.password=${DB_PASS:planify}

# Cria/atualiza as tabelas automaticamente a partir das entidades JPA
spring.jpa.hibernate.ddl-auto=update

# Limite de tamanho dos arquivos enviados
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
