<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetaGrana 💰 — controle seus gastos, alcance suas metas</title>
  <style>
    :root {
      --verde: #059669; --verde-claro: #d1fae5; --amarelo: #d97706; --vermelho: #dc2626;
      --fundo: #f8fafc; --card: #fff; --texto: #0f172a; --borda: #e2e8f0; --cinza: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Segoe UI", system-ui, sans-serif; background: var(--fundo); color: var(--texto); }
    header { background: var(--verde); color: #fff; padding: 1rem 1.2rem; }
    header p { opacity: 0.85; font-size: 0.85rem; }
    main { max-width: 1000px; margin: 1.2rem auto; padding: 0 1rem; display: grid; gap: 1.2rem; grid-template-columns: 1fr 1fr; }
    .card { background: var(--card); border: 1px solid var(--borda); border-radius: 12px; padding: 1.4rem; }
    .card.largo { grid-column: 1 / -1; }
    h2 { font-size: 1.05rem; margin-bottom: 0.8rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; margin: 0.5rem 0 0.15rem; }
    input { width: 100%; padding: 0.5rem; border: 1px solid var(--borda); border-radius: 8px; font: inherit; }
    button { margin-top: 0.8rem; padding: 0.55rem 1.2rem; border: none; border-radius: 8px; background: var(--verde); color: #fff; font-weight: 600; cursor: pointer; }
    button:hover { filter: brightness(1.1); }
    button.mini { margin: 0; padding: 0.25rem 0.7rem; font-size: 0.78rem; }
    button.cinza { background: var(--cinza); }
    .linha { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px dashed var(--borda); gap: 0.5rem; flex-wrap: wrap; font-size: 0.9rem; }
    .total { font-size: 1.6rem; font-weight: 800; color: var(--verde); }
    .barra { background: var(--borda); border-radius: 999px; height: 10px; overflow: hidden; margin: 0.4rem 0; }
    .barra > div { background: var(--verde); height: 100%; transition: width 0.4s; }
    .dica { background: var(--verde-claro); border-radius: 8px; padding: 0.6rem 0.8rem; margin: 0.4rem 0; font-size: 0.88rem; }
    .oferta { font-size: 0.85rem; padding: 0.4rem 0; border-bottom: 1px dashed var(--borda); }
    .msg { font-size: 0.82rem; color: var(--cinza); margin-top: 0.4rem; min-height: 1em; }
    a { color: var(--verde); }
    @media (max-width: 720px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>💰 MetaGrana</h1>
    <p>Controle seus gastos do mês e deixe o sistema caçar os menores preços das suas metas.</p>
  </header>

  <main>
    <!-- Resumo do mês -->
    <section class="card largo">
      <h2>📊 Resumo do mês</h2>
      <div class="total" id="total-mes">R$ 0,00</div>
      <div id="por-categoria"></div>
    </section>

    <!-- Novo gasto -->
    <section class="card">
      <h2>➖ Registrar gasto</h2>
      <label>Descrição</label><input id="g-desc" placeholder="ex.: mercado da semana" />
      <label>Categoria</label><input id="g-cat" placeholder="mercado, lazer, contas..." />
      <label>Valor (R$)</label><input id="g-valor" type="number" step="0.01" min="0" />
      <button onclick="criarGasto()">Adicionar</button>
      <p class="msg" id="g-msg"></p>
      <div id="lista-gastos"></div>
    </section>

    <!-- Nova meta -->
    <section class="card">
      <h2>🎯 Nova meta de compra</h2>
      <label>O que você quer? </label><input id="m-titulo" placeholder="ex.: PlayStation 5" />
      <label>Marca</label><input id="m-marca" placeholder="ex.: Sony" />
      <label>Modelo</label><input id="m-modelo" placeholder="ex.: Slim 1TB" />
      <label>Valor alvo (R$)</label><input id="m-alvo" type="number" step="0.01" min="0" />
      <button onclick="criarMeta()">Criar meta</button>
      <p class="msg" id="m-msg"></p>
    </section>

    <!-- Metas -->
    <section class="card largo">
      <h2>🏁 Minhas metas</h2>
      <div id="lista-metas"><em>Nenhuma meta ainda — crie a primeira acima!</em></div>
    </section>

    <!-- Dicas -->
    <section class="card largo">
      <h2>🧠 Dicas do mês</h2>
      <label>Sua renda mensal (R$) — usada só para calcular as dicas</label>
      <input id="renda" type="number" step="0.01" min="0" style="max-width:220px" />
      <button onclick="pedirDicas()">Gerar dicas</button>
      <div id="lista-dicas"></div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const real = (v) => Number(v).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

    async function api(caminho, metodo = "GET", corpo = null) {
      const resposta = await fetch("/api" + caminho, {
        method: metodo,
        headers: { "Content-Type": "application/json" },
        body: corpo ? JSON.stringify(corpo) : null,
      });
      const dados = await resposta.json().catch(() => ({}));
      if (!resposta.ok) throw new Error(dados.detail?.[0]?.msg || dados.detail || "Erro inesperado");
      return dados;
    }

    // ---------- Gastos ----------
    async function criarGasto() {
      try {
        await api("/gastos", "POST", {
          descricao: $("g-desc").value, categoria: $("g-cat").value || "outros",
          valor: parseFloat($("g-valor").value),
        });
        $("g-msg").textContent = "Gasto registrado ✅";
        $("g-desc").value = $("g-valor").value = "";
        atualizarTudo();
      } catch (e) { $("g-msg").textContent = e.message; }
    }

    async function apagarGasto(id) {
      await api("/gastos/" + id, "DELETE");
      atualizarTudo();
    }

    async function carregarGastos() {
      const mes = new Date().toISOString().slice(0, 7);
      const gastos = await api("/gastos?mes=" + mes);
      $("lista-gastos").innerHTML = "";
      gastos.slice(0, 8).forEach((g) => {
        const div = document.createElement("div");
        div.className = "linha";
        div.innerHTML = `<span></span><strong>${real(g.valor)}</strong>
          <button class="mini cinza" onclick="apagarGasto('${g.id}')">🗑</button>`;
        div.querySelector("span").textContent = `${g.descricao} (${g.categoria})`;
        $("lista-gastos").appendChild(div);
      });
    }

    async function carregarResumo() {
      const resumo = await api("/gastos/resumo");
      $("total-mes").textContent = real(resumo.total);
      $("por-categoria").innerHTML = "";
      Object.entries(resumo.por_categoria).forEach(([categoria, valor]) => {
        const div = document.createElement("div");
        div.className = "linha";
        div.innerHTML = `<span></span><strong>${real(valor)}</strong>`;
        div.querySelector("span").textContent = categoria;
        $("por-categoria").appendChild(div);
      });
    }

    // ---------- Metas ----------
    async function criarMeta() {
      try {
        await api("/metas", "POST", {
          titulo: $("m-titulo").value, marca: $("m-marca").value,
          modelo: $("m-modelo").value, valor_alvo: parseFloat($("m-alvo").value),
        });
        $("m-msg").textContent = "Meta criada! O sistema já vai caçar preços. 🎯";
        carregarMetas();
      } catch (e) { $("m-msg").textContent = e.message; }
    }

    async function guardar(id) {
      const valor = parseFloat(prompt("Quanto você quer guardar nessa meta? (R$)"));
      if (!valor || valor <= 0) return;
      await api(`/metas/${id}/guardar`, "POST", { valor });
      carregarMetas();
    }

    async function verPrecos(id) {
      const alvo = $("ofertas-" + id);
      alvo.innerHTML = "<em>Buscando no Mercado Livre...</em>";
      try {
        const r = await api(`/metas/${id}/precos`);
        alvo.innerHTML = "";
        if (r.variacao) {
          const p = document.createElement("p");
          p.className = "dica";
          p.textContent = r.variacao.caiu
            ? `📉 O preço CAIU ${real(-r.variacao.diferenca)} (${Math.abs(r.variacao.percentual)}%) desde a última busca — boa hora de comprar!`
            : `📈 O preço subiu ${real(r.variacao.diferenca)} desde a última busca.`;
          alvo.appendChild(p);
        }
        r.ofertas.forEach((oferta) => {
          const div = document.createElement("div");
          div.className = "oferta";
          div.innerHTML = `<strong>${real(oferta.preco)}</strong> — <span></span> (${oferta.condicao})
            — <a href="${oferta.link}" target="_blank" rel="noopener">ver anúncio / contato 🔗</a>`;
          div.querySelector("span").textContent = oferta.titulo;
          alvo.appendChild(div);
        });
        if (r.ofertas.length === 0) alvo.innerHTML = "<em>Nenhuma oferta encontrada agora.</em>";
      } catch (e) { alvo.innerHTML = `<em>${e.message}</em>`; }
    }

    async function apagarMeta(id) {
      if (!confirm("Apagar esta meta?")) return;
      await api("/metas/" + id, "DELETE");
      carregarMetas();
    }

    async function carregarMetas() {
      const metas = await api("/metas");
      const alvo = $("lista-metas");
      if (metas.length === 0) return;
      alvo.innerHTML = "";
      metas.forEach((meta) => {
        const div = document.createElement("div");
        div.style.marginBottom = "1.2rem";
        const oferta = meta.melhor_oferta
          ? `Última busca: <strong>${real(meta.melhor_oferta.preco)}</strong> em ${meta.melhor_oferta.data}`
          : "Ainda sem busca de preço — clique em 🔎.";
        div.innerHTML = `
          <div class="linha" style="border:none">
            <strong></strong>
            <span>${real(meta.valor_guardado)} de ${real(meta.valor_alvo)} (${meta.progresso.percentual}%)</span>
          </div>
          <div class="barra"><div style="width:${meta.progresso.percentual}%"></div></div>
          <div style="font-size:0.85rem;color:var(--cinza)">${oferta}</div>
          <div style="margin-top:0.4rem">
            <button class="mini" onclick="guardar('${meta.id}')">💵 Guardar dinheiro</button>
            <button class="mini" onclick="verPrecos('${meta.id}')">🔎 Buscar menor preço</button>
            <button class="mini cinza" onclick="apagarMeta('${meta.id}')">🗑</button>
          </div>
          <div id="ofertas-${meta.id}"></div>`;
        div.querySelector("strong").textContent =
          `🎯 ${meta.titulo} ${meta.marca} ${meta.modelo}`.trim();
        alvo.appendChild(div);
      });
    }

    // ---------- Dicas ----------
    async function pedirDicas() {
      const renda = parseFloat($("renda").value) || 0;
      $("lista-dicas").innerHTML = "<em>Pensando...</em>";
      const r = await api("/dicas?renda=" + renda);
      $("lista-dicas").innerHTML = "";
      r.dicas.forEach((texto) => {
        const p = document.createElement("p");
        p.className = "dica";
        p.textContent = texto;
        $("lista-dicas").appendChild(p);
      });
      const origem = document.createElement("p");
      origem.className = "msg";
      origem.textContent = r.fonte === "ia" ? "✨ Dicas geradas por IA (Claude)" : "Dicas geradas por regras locais";
      $("lista-dicas").appendChild(origem);
    }

    function atualizarTudo() { carregarResumo(); carregarGastos(); carregarMetas(); }
    atualizarTudo();
  </script>
</body>
</html>
